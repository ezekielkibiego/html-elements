<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Login Form</h2>
    <form>
        <label for="">Email:</label> <br>
        <input type="email" name="email" id="email" placeholder="johndoe@example.com">

        <br>
        <label for="">Password:</label> <br>
        <input type="password" name="password" id="password" placeholder="Your Password">

        <br>
        <button type="submit">Login</button>
    </form>

    <h2>Registration Form</h2>

    <form>
        <label for="">Full Name</label><br>
        <input type="text" name="name" id="name" placeholder="John Doe"><br>

        <label for="">Username</label><br>
        <input type="text" name="username" id="username" placeholder="johndoe"><br>

        <label for="">Email:</label> <br>
        <input type="email" name="email" id="email" placeholder="johndoe@example.com">
        <br>

        <label for="">Password:</label> <br>
        <input type="password" name="password" id="password" placeholder="Your Password">
        <br>

        <label for="">Repeat Password:</label> <br>
        <input type="password" name="password" id="password" placeholder="Your Password">
        <br>

        <button type="submit">Register</button>
    </form>

    <h2>Contact Us</h2>
    <form>
        <label for="">Your Name*</label>
        <input type="text" name="name" id="name" placeholder="John Doe" required >
        
        <label for="">Email Address*</label>
        <input type="email" name="email" id="email" placeholder="johndoe@example.com" required>
        <br>

        <label for="">Subject</label><br>
        <input type="text" name="subject" id="subject" placeholder="How can we help you?" required>
        <br>

        <label for="">Preferred Contact Method</label><br>
        <button>Email</button> 
        <button>Phone</button>
        <input type="number">
        <button>WhatsApp</button>
        <br>

        <label for="">Your Message</label><br>
        <textarea name="" id="" cols="30" rows="10" placeholder="Tell us about your inquiry..."></textarea>
        <br>


        <button type="submit">Submit</button>
    </form>

</body>
</html>
